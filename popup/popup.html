<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageChat AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">PageChat AI</h1>
      </div>
      <div class="header-right">
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="settingsView" class="view hidden">
      <div class="settings-content">
        <div class="form-group">
          <label for="apiKey">OpenRouter API Key</label>
          <div class="input-with-icon">
            <input type="password" id="apiKey" placeholder="sk-or-v1-..." autocomplete="off">
            <button id="toggleKeyBtn" class="toggle-btn" title="Show/Hide key">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <optgroup label="OpenAI">
              <option value="openai/gpt-4o">GPT-4o</option>
              <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
              <option value="openai/o3-mini">o3 Mini</option>
            </optgroup>
            <optgroup label="Anthropic">
              <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
              <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
            </optgroup>
            <optgroup label="Google">
              <option value="google/gemini-2.5-pro-preview-05-06">Gemini 2.5 Pro</option>
              <option value="google/gemini-2.5-flash-preview-05-06">Gemini 2.5 Flash</option>
              <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
            </optgroup>
            <optgroup label="Meta">
              <option value="meta-llama/llama-4-maverick">Llama 4 Maverick</option>
              <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B</option>
            </optgroup>
            <optgroup label="DeepSeek">
              <option value="deepseek/deepseek-chat-v3-0324">DeepSeek V3</option>
              <option value="deepseek/deepseek-r1">DeepSeek R1</option>
            </optgroup>
            <optgroup label="Mistral">
              <option value="mistralai/mistral-large">Mistral Large</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group">
          <label for="customModel">Custom Model ID (optional)</label>
          <input type="text" id="customModel" placeholder="provider/model-name" autocomplete="off">
          <span class="hint">Overrides the dropdown selection if set</span>
        </div>

        <button id="saveSettingsBtn" class="btn primary-btn full-width">Save Settings</button>
        <div id="settingsStatus" class="status-msg"></div>
      </div>
    </div>

    <div id="chatView" class="view">
      <div id="pageInfo" class="page-info">
        <div class="page-info-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
        </div>
        <span id="pageTitle" class="page-title">Loading page...</span>
      </div>

      <div id="messagesContainer" class="messages">
        <div class="welcome-message">
          <div class="welcome-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <h2>Ask about this page</h2>
          <p>I've read the page content. Ask me anything about it!</p>
          <div class="quick-actions">
            <button class="quick-btn" data-prompt="Summarize this page in 3-5 bullet points.">Summarize</button>
            <button class="quick-btn" data-prompt="What are the key points of this page?">Key Points</button>
            <button class="quick-btn" data-prompt="Explain this page like I'm 10 years old.">ELI5</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <textarea id="userInput" placeholder="Ask about this page..." rows="1" autofocus></textarea>
          <button id="sendBtn" class="send-btn" title="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span id="charCount" class="char-count">0</span>
        </div>
      </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Thinking...</p>
      </div>
    </div>
  </div>

  <script src="../lib/marked.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
